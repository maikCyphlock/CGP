<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Administrativo - Contraloría del Municipio Páez</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    h1, h2, h3 { 
      ont-family: 'Inter', sans-serif;  /* Montserrat para títulos */
      text-transform: uppercase; /* Esto le da mucha más fuerza y formalidad */
      letter-spacing: -0.5px; /* Un toque moderno */
    }

    p {
        text-align: justify;
        line-height: 1.7; 
    }
    body { 
      font-family: 'Inter', sans-serif; /* Ya con la nueva tipografía */
      background-color: #0d1b3e;       /* AQUÍ ESTÁ EL CAMBIO AL AZUL */
      margin: 0;
      height: 100vh;
      overflow: hidden;
    }
    .login-wrapper {
      display: flex;
      height: 100vh;
    }

    .login-info {
      /* Usamos el azul oscuro (rgb: 13, 27, 62) con 93% de opacidad en ambos extremos */
      background: linear-gradient(135deg, rgba(13, 27, 62, 0.93) 0%, rgba(13, 27, 62, 0.93) 100%), 
                  url('../cgp/assets/img/portadahero.jpg'); 
      background-size: cover;
      background-position: center;
      width: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }

    .info-content {
      max-width: 450px;
      z-index: 2;
    }

    .login-logo {
      width: 80px;
      height: 80px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      object-fit: cover;
    }

    .login-info h1 {
      font-family: 'Roboto', sans-serif;
      font-weight: 900;
      font-size: 2.5rem;
      margin-bottom: 5px;
    }

    .login-info h2 {
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: 1.5rem;
      color: #64b5f6;
    }

    .login-info p {
      font-size: 0.95rem;
      line-height: 1.6;
      opacity: 0.8;
    }

    /* Panel Derecho */
    .login-form-container {
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color:  ghostwhite;
    }

    @media (max-width: 768px) {
      .login-info { display: none !important; }
      .login-form-container { width: 100%; }
    }

    .form-box {
      background: rgba(255, 255, 255, 0.1); 
      backdrop-filter: blur(15px);          
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      color: white;                       
      width: 100%;
      max-width: 450px;
    }

    .form-box:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(26, 35, 64, 0.15);
    }

    .form-control {
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-label {
      font-weight: 600;
      color: #1a2340;
      font-size: 0.85rem;
    }

   .btn-check:checked + .btn-outline-primary {
      background-color: #0d1b3e !important;
      border-color: #0d1b3e !important;
      color: white !important;
      transform: scale(1.02);
      transition: all 0.3s ease;
    }

    .btn-outline-primary {
      border: 2px solid #dde3ee !important;
      color: #1a2340 !important;
      text-align: left !important;
      font-weight: 600;
      padding: 8px 15px !important; 
      font-size: 0.85rem !important; 
      transition: all 0.3s ease;
      border-radius: 8px !important; 
    }

    .btn-outline-primary i {
      font-size: 1rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: #1565c0;
      box-shadow: 0 0 0 0.2rem rgba(21, 101, 192, 0.15);
    }

    .forgot-link {
      color: #1565c0;
      font-size: 0.8rem;
      text-decoration: none;
      font-weight: 600;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .btn-login {
      background-color: #0d1b3e; 
      color: white;
      font-weight: 700;
      padding: 12px;
      border-radius: 6px;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
      border: none;
    }

    .btn-login:hover {
      background-color: #1a2340; 
      color: white;
      transform: translateY(-2px);
    }

    .login-logo-mobile {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      object-fit: cover;
    }

    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .login-info { animation: fadeInLeft 0.8s ease-out forwards; }
    .login-form-container { animation: fadeInRight 0.8s ease-out forwards; 
    }

    .btn-loading {
      pointer-events: none;
      opacity: 0.7;
    }
    .spinner-border-sm {
      margin-right: 8px;
    }

    .info-content h1 {
      background: linear-gradient(to right, #ffffff, #b3e5fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head> 
<body>

<div class="login-wrapper">
  <!-- Panel Izquierdo Institucional -->
  <div class="login-info">
    <div class="info-content">
      <h1>Panel de Administración</h1>
      <p class="mt-4">Acceso restringido exclusivo para personal autorizado de la Contraloría del Municipio Páez. Toda actividad en este portal es monitoreada para garantizar la transparencia y seguridad de los datos.</p>
    </div>
  </div>

  <!-- Panel Derecho Formulario -->
  <div class="login-form-container">
    <div class="form-box">
      <div class="text-center d-md-none mb-4">
  
      </div>
    <div class="d-flex align-items-center justify-content-center mb-4 p-3 rounded" style="background-color: #0d1b3e;">
    <img src="../cgp/assets/img/logo.jpeg" alt="Logo" style="width: 40px; height: 40px; margin-right: 12px; border-radius: 8px; object-fit: cover;">
    <h3 class="mb-0 text-white" style="font-family: 'Roboto', sans-serif; font-weight: 700;">INICIAR SESIÓN</h3>
      </div>      
      <form action="admin_cms.html" method="GET"> <!-- ese admin_cms.html se refiere al deshboard o al gestor pues, solo que no lo subo aun porque no lo tengo listo-->
        <div class="row g-2">
     <div class="col-12">
      <input type="radio" class="btn-check" name="rol" id="rol1" value="editor" checked>
      <label class="btn btn-outline-primary w-100 py-3 rounded-3 shadow-sm" for="rol1">
        <i class="bi bi-pencil-square me-2"></i> Gestor de Contenido Web
       </label>
  </div>
  <div class="col-12">
    <input type="radio" class="btn-check" name="rol" id="rol2" value="denuncias">
    <label class="btn btn-outline-primary w-100 py-3 rounded-3 shadow-sm" for="rol2">
      <i class="bi bi-megaphone-fill me-2"></i> Gestor de Módulo de Denuncias
    </label>
  </div>
</div>
        <div class="mb-3">
          <hr> 
          <label for="email" class="form-label">Correo electrónico / Usuario</label>
          <input type="email" class="form-control" id="email" placeholder="usuario@cgr.gob.ve" required>
        </div>
        
        <div class="mb-4">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
          <div class="text-end mt-2">
            <a href="#" class="forgot-link">¿Olvidó su clave?</a>
          </div>
        </div>

        <button type="submit" class="btn btn-login w-100">ACCEDER</button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
